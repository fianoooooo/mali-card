<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>马利107周年·上岸祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #F5F1E8 0%, #E8E0D5 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* 背景装饰 */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        /* 主容器 */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 品牌标识 */
        .brand {
            position: absolute;
            top: 60px;
            text-align: center;
            color: #8B4513;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .brand-logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #C8102E;
        }
        
        /* 祝福文字区 */
        .blessing {
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }
        
        .blessing-main {
            font-size: 48px;
            font-weight: bold;
            color: #1A1A1A;
            margin-bottom: 20px;
            line-height: 1.2;
            letter-spacing: 4px;
        }
        
        .blessing-sub {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        
        .blessing-date {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
        }
        
        /* 按钮区 */
        .action-area {
            position: absolute;
            bottom: 80px;
            width: 100%;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .btn {
            width: 100%;
            padding: 16px 0;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        
        .btn-primary {
            background: #1A1A1A;
            color: #fff;
        }
        
        .btn-primary:active {
            transform: scale(0.95);
            background: #333;
        }
        
        .btn-secondary {
            background: transparent;
            color: #666;
            border: 1px solid #ddd;
        }
        
        /* 区块链信息弹窗（保留样式但暂不显示） */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
        }
        
        .modal-content {
            background: white;
            width: 100%;
            max-height: 70vh;
            border-radius: 20px 20px 0 0;
            padding: 30px;
            animation: slideUp 0.3s ease-out;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #1A1A1A;
        }
        
        .close-btn {
            font-size: 24px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }
        
        .chain-info {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .chain-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .chain-row:last-child {
            margin-bottom: 0;
        }
        
        .chain-label {
            color: #999;
        }
        
        .chain-value {
            color: #333;
            font-family: monospace;
            text-align: right;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .hash-value {
            font-size: 12px;
            background: #e8e8e8;
            padding: 8px;
            border-radius: 6px;
            word-break: break-all;
            margin-top: 8px;
            color: #666;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        /* 不同稀有度的颜色主题 */
        .rare-common .blessing-main { color: #1A1A1A; }
        .rare-uncommon .blessing-main { color: #C8102E; }
        .rare-legendary .blessing-main { 
            color: #D4AF37;
            text-shadow: 0 2px 10px rgba(212,175,55,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    
    <div class="container">
        <div class="brand">
            <div class="brand-logo">马利</div>
            <div>107周年限定</div>
        </div>
        
        <div class="blessing" id="blessingContent">
            <div class="blessing-main" id="mainText">顺滑上岸</div>
            <div class="blessing-sub" id="subText">
                每一笔，都是上岸的伏笔<br>
                马利107年，陪你画出未来
            </div>
            <div class="blessing-date" id="dateText">2025.05.09</div>
        </div>
        
        <div class="action-area">
            <button class="btn btn-primary" onclick="showBlockchain()">
                查看区块链凭证
            </button>
            <button class="btn btn-secondary" onclick="share()">
                分享给好友
            </button>
        </div>
    </div>
    
    <!-- 区块链信息弹窗（保留结构但暂不显示） -->
    <div class="modal" id="blockchainModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">链上证书</div>
                <div class="close-btn" onclick="closeModal()">&times;</div>
            </div>
            
            <div class="chain-info">
                <div class="chain-row">
                    <span class="chain-label">藏品编号</span>
                    <span class="chain-value" id="tokenId">ML20250001</span>
                </div>
                <div class="chain-row">
                    <span class="chain-label">上链时间</span>
                    <span class="chain-value" id="timestamp">2025-05-09 10:07:00</span>
                </div>
                <div class="chain-row">
                    <span class="chain-label">区块高度</span>
                    <span class="chain-value">#1070000</span>
                </div>
                <div class="chain-row">
                    <span class="chain-label">链上网络</span>
                    <span class="chain-value">蚂蚁链</span>
                </div>
            </div>
            
            <div style="margin-bottom: 12px; font-size: 14px; color: #666;">交易哈希</div>
            <div class="hash-value" id="txHash">
                0x3f2a8d9c1e4b7f6a5d2c8e9b1f4a7d6c3e9b2a5f8d1c4e7b0a3f6d9c2e5b8a
            </div>
            
            <div style="margin-top: 24px; font-size: 12px; color: #999; text-align: center;">
                本祝福已上链永久保存，不可篡改
            </div>
        </div>
    </div>

    <script>
        // 获取URL参数（用于区分不同卡牌）
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        // 初始化页面
        function init() {
            const id = getUrlParam('id') || 'ML20250001';
            const rare = getUrlParam('rare') || 'common'; // common/uncommon/legendary
            
            // 根据ID和稀有度设置不同内容
            const blessings = {
                common: {
                    main: '顺滑上岸',
                    sub: '每一笔，都是上岸的伏笔<br>马利107年，陪你画出未来',
                    color: 'rare-common'
                },
                uncommon: {
                    main: '显色如愿',
                    sub: '你的色彩，终将显灵<br>马利107年，见证你的光芒',
                    color: 'rare-uncommon'
                },
                legendary: {
                    main: '金榜题名',
                    sub: '此去前程，皆是坦途<br>马利107年，为你喝彩',
                    color: 'rare-legendary'
                }
            };
            
            const data = blessings[rare] || blessings.common;
            
            document.getElementById('mainText').textContent = data.main;
            document.getElementById('subText').innerHTML = data.sub;
            document.getElementById('tokenId').textContent = id;
            document.getElementById('blessingContent').className = 'blessing ' + data.color;
            
            // 生成伪区块链数据（实际应调用API）
            document.getElementById('txHash').textContent = '0x' + Math.random().toString(16).substr(2, 64);
        }
        
        // 查看区块链凭证 - 直接跳转到海卡验证页（固定链接）
        function showBlockchain() {
            window.open('https://nfc.haikaflow.com/#/pages/verfiy/assets?platform=GGSK&issuer=SHHSX&assetsId=g1097', '_blank');
        }
        
        // 关闭弹窗（保留函数但暂不主动调用）
        function closeModal(event) {
            if (!event || event.target.id === 'blockchainModal') {
                document.getElementById('blockchainModal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
        
        // 分享功能
        function share() {
            if (navigator.share) {
                navigator.share({
                    title: '马利107周年·上岸祝福',
                    text: '我收到了马利的上岸祝福，快来领取你的专属祝福！',
                    url: window.location.href
                });
            } else {
                // 复制链接
                const input = document.createElement('input');
                input.value = window.location.href;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('链接已复制，快去分享给好友吧！');
            }
        }
        
        // 页面加载时初始化
        init();
    </script>
</body>
</html>
